<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#FF9EB1" rx="10" ry="10" />
  <rect x="25" y="25" width="50" height="50" fill="none" stroke="#333" stroke-width="3" />
  
  <!-- Small white dots at corners -->
  <circle cx="25" cy="25" r="4" fill="white" />
  <circle cx="75" cy="25" r="4" fill="white" />
  <circle cx="25" cy="75" r="4" fill="white" />
  <circle cx="75" cy="75" r="4" fill="white" />
  
  <!-- Letters -->
  <text x="15" y="50" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-weight="bold" font-size="10">L</text>
  <text x="50" y="15" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-weight="bold" font-size="10">B</text>
  <text x="85" y="50" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-weight="bold" font-size="10">X</text>
  <text x="50" y="85" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-weight="bold" font-size="10">G</text>
</svg>